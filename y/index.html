<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAV Waste Heatmap Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header">
        <h1>UAV Waste Dashboard</h1>
        <div id="status">Syncing...</div>
    </div>
    
    <div id="main-container" style="display: flex; height: calc(100vh - 60px);">
        <div id="sidebar" style="width: 300px; padding: 15px; background: #1e1e1e; overflow-y: auto;">
            <h3>Statistics</h3>
            <div id="stats-panel">Total: 0</div>
            <hr>
            <h3>Filters</h3>
            <label>Start Date:</label>
            <input type="date" id="date-from">
            <label>End Date:</label>
            <input type="date" id="date-to">
            <button id="apply-filter">Apply Filter</button>
        </div>
        
        <div id="map" style="flex-grow: 1;"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
