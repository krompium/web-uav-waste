<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Heatmap Sampah dari Firebase</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: Arial, sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; }
        
        #legend { position: absolute; bottom: 30px; left: 30px; background: rgba(255,255,255,0.95); color: #333; padding: 15px; border-radius: 4px; z-index: 999; box-shadow: 0 2px 6px rgba(0,0,0,0.3); width: 320px; }
        .controls { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); z-index: 999; display: flex; gap: 8px; }
        .time-button { padding: 10px 14px; background: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; box-shadow: 0 2px 6px rgba(0,0,0,0.3); font-size: 13px; color: #565656; transition: background 0.2s; }
        .time-button:hover { background: #f5f5f5; color: #222; }
        .time-button.active { background: #3498db; color: white; }
        .nav-links { position: absolute; top: 12px; right: 60px; z-index: 999; background: white; padding: 0 15px; border-radius: 4px; box-shadow: 0 2px 6px rgba(0,0,0,0.3); height: 40px; display: flex; align-items: center; }
        .nav-links a { text-decoration: none; color: #565656; font-weight: bold; font-size: 13px; }
        .nav-links a:hover { color: #222; }
    </style>
</head>
<body>
    <div class="nav-links">
        <a href="statistics.html">Statistics</a>
    </div>

    <div class="controls">
        <button class="time-button active" data-filter="all">Semua Waktu</button>
        <button class="time-button" data-filter="today">Hari Ini</button>
        <button class="time-button" data-filter="week">Minggu Ini</button>
        <button class="time-button" data-filter="month">Bulan Ini</button>
    </div>

    <div id="legend">
        <h4 style="margin-top:0; margin-bottom:12px; text-align:center; font-size:14px;">Estimasi Volume Sampah</h4>
        <div style="display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; margin-bottom: 4px; color: #555;">
            <span style="flex: 1; text-align: center;">Sedikit</span>
            <span style="flex: 1; text-align: center;">Sedang</span>
            <span style="flex: 1; text-align: center;">Banyak</span>
            <span style="flex: 1; text-align: center;">Sangat Byk</span>
        </div>
        <div style="position: relative; width: 100%; height: 18px; background: linear-gradient(to right, #00FF00, #FFFF00, #FFA500, #FF0000); border-radius: 4px; border: 1px solid #ccc;">
            <div style="position: absolute; left: 25%; top: 0; bottom: 0; border-left: 2px solid white;"></div>
            <div style="position: absolute; left: 50%; top: 0; bottom: 0; border-left: 2px solid white;"></div>
            <div style="position: absolute; left: 75%; top: 0; bottom: 0; border-left: 2px solid white;"></div>
        </div>
        <div style="display: flex; justify-content: space-between; font-size: 12px; font-weight: bold; margin-top: 5px; color: #222;">
            <span style="flex: 1; text-align: center;">1-10</span>
            <span style="flex: 1; text-align: center;">11-25</span>
            <span style="flex: 1; text-align: center;">26-40</span>
            <span style="flex: 1; text-align: center;">41-50+</span>
        </div>
    </div>

    <div id="map"></div>

    <script style="display:none;">
        window.googleMapsBridgeCallback = function() {
            if (window.jalankanInisialisasiPeta) { window.jalankanInisialisasiPeta(); } 
            else { window.googleMapsScriptSudahSiap = true; }
        };
    </script>
    <script type="module" src="/app.js"></script>
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDaN7fGUo5I4rDQNhNS5uJA97CJp5gh_Qw&v=3.64&libraries=visualization&callback=googleMapsBridgeCallback"></script>
</body>
</html>
