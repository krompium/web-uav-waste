<!DOCTYPE html>
<html>
<head>
    <title>Statistik Deteksi Sampah</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif; margin: 0; padding: 20px;
            background-color: #1a1a1a; color: #ffffff;
        }
        .container { max-width: 1200px; margin: 0 auto; background-color: rgba(33, 33, 33, 0.95); padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .nav-links { margin-bottom: 20px; }
        .nav-links a { margin-right: 15px; text-decoration: none; color: #3498db; font-weight: bold; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #2c3e50; padding: 20px; border-radius: 10px; text-align: center; }
        .stat-number { font-size: 2em; font-weight: bold; color: #2ecc71; margin-top: 10px; }
        .chart-container { background: #2c3e50; padding: 20px; border-radius: 10px; margin-bottom: 20px; height: 400px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-links">
            <a href="index.html">⬅ Kembali ke Map</a>
            <a href="Managedata.html">Kelola Data ➡</a>
        </div>
        <h1 style="text-align: center;">Dashboard Statistik</h1>
        
        <div class="stats-grid">
            <div class="stat-card"><h3>Total Deteksi</h3><div class="stat-number" id="stats-total">0</div></div>
            <div class="stat-card"><h3>Deteksi Hari Ini</h3><div class="stat-number" id="stats-today">0</div></div>
            <div class="stat-card"><h3>Deteksi Minggu Ini</h3><div class="stat-number" id="stats-this-week">0</div></div>
        </div>

        <div class="chart-container"><canvas id="dailyChart"></canvas></div>
        <div class="chart-container"><canvas id="hourlyChart"></canvas></div>
    </div>

    <script type="module">
        import { db, collection, onSnapshot, parseFirestoreTimestamp } from './firebase-config.js';

        let dailyChartInst = null;
        let hourlyChartInst = null;

        onSnapshot(collection(db, "waste_detections_v2"), (snapshot) => {
            const data = snapshot.docs.map(doc => doc.data());
            processStats(data);
        });

        function processStats(data) {
            const now = Date.now();
            const oneDay = 24 * 60 * 60 * 1000;
            let countToday = 0, countWeek = 0;
            const dailyCounts = {};
            const hourlyCounts = new Array(24).fill(0);

            data.forEach(d => {
                const dTime = parseFirestoreTimestamp(d.timestamp);
                const dateObj = new Date(dTime);
                
                if ((now - dTime) <= oneDay) countToday++;
                if ((now - dTime) <= (7 * oneDay)) countWeek++;

                const dateStr = dateObj.toISOString().split('T')[0];
                dailyCounts[dateStr] = (dailyCounts[dateStr] || 0) + 1;
                hourlyCounts[dateObj.getHours()]++;
            });

            document.getElementById('stats-total').innerText = data.length;
            document.getElementById('stats-today').innerText = countToday;
            document.getElementById('stats-this-week').innerText = countWeek;

            renderCharts(dailyCounts, hourlyCounts);
        }

        function renderCharts(dailyCounts, hourlyCounts) {
            const sortedDates = Object.keys(dailyCounts).sort();
            const dailyData = sortedDates.map(date => dailyCounts[date]);
            const hourLabels = Array.from({length: 24}, (_, i) => `${i.toString().padStart(2, '0')}:00`);

            Chart.defaults.color = '#ffffff';

            if (dailyChartInst) dailyChartInst.destroy();
            dailyChartInst = new Chart(document.getElementById('dailyChart'), {
                type: 'line',
                data: { labels: sortedDates, datasets: [{ label: 'Deteksi Harian', data: dailyData, borderColor: '#2ecc71', backgroundColor: 'rgba(46, 204, 113, 0.2)', fill: true, tension: 0.4 }] },
                options: { responsive: true, maintainAspectRatio: false }
            });

            if (hourlyChartInst) hourlyChartInst.destroy();
            hourlyChartInst = new Chart(document.getElementById('hourlyChart'), {
                type: 'bar',
                data: { labels: hourLabels, datasets: [{ label: 'Distribusi Waktu (24 Jam)', data: hourlyCounts, backgroundColor: '#3498db' }] },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }
    </script>
</body>
</html>
