<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Statistik Deteksi Sampah</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/style.css">
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: #f8fafc; 
            color: #334155; 
            margin: 0; 
            padding: 20px; 
            padding-bottom: 120px; 
        }
        
        .dashboard-container { 
            max-width: 1400px; 
            margin: 0 auto; 
            margin-bottom: 60px; 
        }
        
        /* Nav & Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .nav-links a { text-decoration: none; color: #3b82f6; font-weight: bold; margin-right: 15px; }

        /* KPI Cards (Sekarang menjadi 3 Kolom) */
        .kpi-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 15px; margin-bottom: 20px; 
        }
        .kpi-card { 
            background: white; padding: 20px; border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; 
            border-left: 5px solid #3b82f6; 
            display: flex; flex-direction: column; justify-content: center;
        }
        .kpi-card h3 { 
            margin: 0 0 10px 0; font-size: 13px; color: #64748b; 
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .kpi-card .value { font-size: 28px; font-weight: 900; color: #0f172a; }

        /* Charts & Map Grid */
        .chart-grid-full { margin-bottom: 20px; }
        .chart-grid-half { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        
        .chart-container { 
            background: white; padding: 20px; border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: relative; 
            height: 380px; width: 100%; box-sizing: border-box;
        }
        
        #minimap-container { height: 100%; width: 100%; border-radius: 8px; overflow: hidden; background: #e2e8f0; }

        @media screen and (max-width: 900px) {
            .chart-grid-half { grid-template-columns: 1fr; }
            .chart-container { height: 350px; }
            body { padding: 10px; padding-bottom: 150px; }
            .kpi-card { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="header">
        <div class="nav-links">
            <a href="/">⬅ Kembali ke Peta Utama</a>
        </div>
    </div>

    <h2 style="margin-top:0;">Statistik Deteksi Sampah</h2>

    <div class="kpi-grid">
        <div class="kpi-card" style="border-color: #ef4444;">
            <h3>Total Sampah Terdeteksi</h3>
            <div class="value" id="val-total">Memuat...</div>
        </div>
        <div class="kpi-card" style="border-color: #eab308;">
            <h3>
                Rata-rata Sampah per Lokasi <br>
                <small style="font-size: 10px; color: #94a3b8; text-transform: none; letter-spacing: normal;">(Area Grid ~11x11 Meter)</small>
            </h3>
            <div class="value" id="val-avg-loc">Memuat...</div>
        </div>
        <div class="kpi-card" style="border-color: #22c55e;">
            <h3>Jam Puncak Deteksi</h3>
            <div class="value" id="val-peak">Memuat...</div>
        </div>
    </div>

    <div class="chart-grid-full">
        <div class="chart-container">
            <canvas id="dailyChart"></canvas>
        </div>
    </div>

    <div class="chart-grid-half">
        <div class="chart-container">
            <canvas id="hourlyChart"></canvas>
        </div>

        <div class="chart-container" style="padding: 10px;">
            <div id="minimap-container"></div>
        </div>
    </div>
</div>

<script>
    window.initMinimap = function() {
        window.googleMapsReady = true;
        if(window.renderMinimap) window.renderMinimap();
    };
</script>
<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDaN7fGUo5I4rDQNhNS5uJA97CJp5gh_Qw&v=3.64&libraries=visualization&callback=initMinimap"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCviQcPHm2QRhBmJd4mzSc9SkukV-U4XuY",
        authDomain: "uavwaste.firebaseapp.com",
        projectId: "uavwaste",
        storageBucket: "uavwaste.firebasestorage.app",
        messagingSenderId: "882801598844",
        appId: "1:882801598844:web:3b8ba0746ad40f44d684f9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let detections = [];
    let charts = {};
    let map, heatmapLayer;

    // Parser Waktu Tahan Banting
    function parseTimestamp(val) {
        if (!val) return null;
        if (val.toDate) return val.toDate();
        if (val.seconds) return new Date(val.seconds * 1000);

        let d = new Date(val);
        if (!isNaN(d.getTime())) return d;

        if (typeof val === 'string') {
            try {
                let cleanStr = val.replace(" at ", " ").replace(" UTC", " GMT");
                d = new Date(cleanStr);
                if (!isNaN(d.getTime())) return d;

                const match = val.match(/^([A-Za-z]+ \d{1,2}, \d{4}) at (\d{1,2}:\d{2}:\d{2}) (AM|PM) UTC([+-]\d{4})$/);
                if (match) {
                    const [_, datePart, timePart, meridian, timezone] = match;
                    let [hours, minutes, seconds] = timePart.split(':').map(Number);
                    if (meridian === 'PM' && hours !== 12) hours += 12;
                    if (meridian === 'AM' && hours === 12) hours = 0;
                    
                    const timeString = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                    d = new Date(`${datePart} ${timeString} GMT${timezone}`);
                    if (!isNaN(d.getTime())) return d;
                }
            } catch(e) {}
        }
        return null;
    }

    async function loadStatistics() {
        try {
            const querySnapshot = await getDocs(collection(db, "waste_detections_v2"));
            
            if (querySnapshot.empty) {
                document.getElementById('val-total').textContent = "0";
                return;
            }

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const lat = parseFloat(data.latitude);
                const lng = parseFloat(data.longitude);
                const timeObj = parseTimestamp(data.timestamp); 
                
                if (!isNaN(lat) && !isNaN(lng) && timeObj !== null) {
                    detections.push({
                        timestamp: timeObj,
                        lat: lat,
                        lng: lng,
                        jumlah: parseInt(data.jumlahDeteksi) || 1
                    });
                }
            });

            processDataAndRender();

        } catch (error) {
            console.error("Error mengambil data:", error);
            document.getElementById('val-total').textContent = "ERROR";
        }
    }

    function processDataAndRender() {
        if (detections.length === 0) return;

        // KPI
        const totalDeteksi = detections.reduce((sum, d) => sum + d.jumlah, 0);
        const uniqueLocs = new Set(detections.map(d => `${d.lat.toFixed(4)},${d.lng.toFixed(4)}`)).size;
        const avgPerLoc = (totalDeteksi / uniqueLocs).toFixed(1);

        document.getElementById('val-total').textContent = totalDeteksi;
        document.getElementById('val-avg-loc').textContent = avgPerLoc;

        // STRUKTUR DATA UNTUK TOOLTIP PROGRESSIVE DISCLOSURE
        const dailyData = {};
        const detailsPerDay = {};
        
        const hourlyData = Array(24).fill(0);
        const hourlyDetails = Array(24).fill().map(() => []);

        detections.forEach(d => {
            const dateStr = d.timestamp.toLocaleDateString('id-ID', {day: '2-digit', month: 'short', year: 'numeric'});
            const timeStr = d.timestamp.toLocaleTimeString('id-ID', {hour: '2-digit', minute: '2-digit'}).replace('.', ':');

            // Agregasi Harian
            dailyData[dateStr] = (dailyData[dateStr] || 0) + d.jumlah;
            if (!detailsPerDay[dateStr]) detailsPerDay[dateStr] = [];
            detailsPerDay[dateStr].push({ time: timeStr, jumlah: d.jumlah });

            // Agregasi Jam
            const hour = d.timestamp.getHours();
            if(hour >= 0 && hour < 24) {
                hourlyData[hour] += d.jumlah;
                hourlyDetails[hour].push({ time: timeStr, jumlah: d.jumlah });
            }
        });

        // Sorting Harian
        const sortedDates = Object.keys(dailyData).sort((a, b) => {
            const partsA = a.split(" "); const partsB = b.split(" ");
            return new Date(`${partsA[1]} ${partsA[0]}, ${partsA[2]}`) - new Date(`${partsB[1]} ${partsB[0]}, ${partsB[2]}`);
        });
        const sortedCounts = sortedDates.map(date => dailyData[date]);

        // Peak Hour
        const peakHour = hourlyData.indexOf(Math.max(...hourlyData));
        document.getElementById('val-peak').textContent = `${peakHour.toString().padStart(2, '0')}:00`;

        // Render Grafik dengan Detail Per Waktu
        renderCharts(sortedDates, sortedCounts, hourlyData, detailsPerDay, hourlyDetails);

        window.renderMinimap = () => initMinimapEngine();
        if (window.googleMapsReady) window.renderMinimap();
    }

    function renderCharts(dates, counts, hourly, detailsPerDay, hourlyDetails) {
        Chart.defaults.color = '#475569';
        Chart.defaults.font.family = "'Segoe UI', Arial, sans-serif";

        if(charts.daily) charts.daily.destroy();
        if(charts.hourly) charts.hourly.destroy();

        charts.daily = new Chart(document.getElementById('dailyChart'), {
            type: 'line',
            data: {
                labels: dates,
                datasets: [{
                    label: 'Jumlah Deteksi',
                    data: counts,
                    backgroundColor: 'rgba(76, 175, 80, 0.2)', 
                    borderColor: '#4CAF50',
                    borderWidth: 2,
                    tension: 0.4,
                    fill: true,
                    pointBackgroundColor: '#4CAF50',
                    pointBorderColor: '#fff',
                    pointBorderWidth: 2,
                    pointRadius: 4,
                    pointHoverRadius: 6
                }]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false, 
                plugins: { 
                    legend: { display: false }, 
                    title: {display: true, font: {size: 14}, text: 'Distribusi Deteksi per Hari'},
                    tooltip: {
                        backgroundColor: 'rgba(255, 255, 255, 0.95)',
                        titleColor: '#0f172a',
                        bodyColor: '#334155',
                        borderColor: '#cbd5e1',
                        borderWidth: 1,
                        padding: 10,
                        callbacks: {
                            title: (tooltipItems) => {
                                return tooltipItems[0].label;
                            },
                            label: (context) => {
                                const date = dates[context.dataIndex];
                                const details = detailsPerDay[date];
                                
                                // Mapping dan sorting data waktu
                                let detailTexts = details.map(d => `• Pukul ${d.time} - ${d.jumlah} sampah`).sort();
                                
                                const displayLimit = 8;
                                const excess = detailTexts.length - displayLimit;
                                if (excess > 0) {
                                    detailTexts = detailTexts.slice(0, displayLimit);
                                    detailTexts.push(`...dan ${excess} rekaman waktu lainnya`);
                                }

                                return [
                                    `Total Harian: ${context.parsed.y} sampah`,
                                    `Frekuensi Muncul: ${details.length} kali`,
                                    '',
                                    'Rincian Waktu:',
                                    ...detailTexts
                                ];
                            }
                        }
                    }
                },
                scales: { 
                    y: { beginAtZero: true, grid: { color: '#e2e8f0' } },
                    x: { grid: { display: false } }
                }
            }
        });

        charts.hourly = new Chart(document.getElementById('hourlyChart'), {
            type: 'bar',
            data: {
                labels: Array.from({length: 24}, (_, i) => `${i.toString().padStart(2, '0')}:00`),
                datasets: [{
                    label: 'Volume Berdasarkan Jam',
                    data: hourly,
                    backgroundColor: '#3b82f6', 
                    borderRadius: 4
                }]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false, 
                plugins: { 
                    legend: { display: false }, 
                    title: {display: true, font: {size: 14}, text: 'Distribusi Waktu Deteksi (24 Jam)'},
                    tooltip: {
                        backgroundColor: 'rgba(255, 255, 255, 0.95)',
                        titleColor: '#0f172a',
                        bodyColor: '#334155',
                        borderColor: '#cbd5e1',
                        borderWidth: 1,
                        padding: 10,
                        callbacks: {
                            title: (tooltipItems) => {
                                return `Rekap Pukul ${tooltipItems[0].label}`;
                            },
                            label: (context) => {
                                const hour = parseInt(context.label);
                                const details = hourlyDetails[hour];
                                if (!details || details.length === 0) return ['Tidak ada aktivitas.'];

                                let detailTexts = details.map(d => `• Menit ke ${d.time.split(':')[1]} - ${d.jumlah} sampah`).sort();
                                
                                const displayLimit = 6;
                                const excess = detailTexts.length - displayLimit;
                                if (excess > 0) {
                                    detailTexts = detailTexts.slice(0, displayLimit);
                                    detailTexts.push(`...dan ${excess} deteksi lainnya`);
                                }

                                return [
                                    `Total Per Jam: ${context.parsed.y} sampah`,
                                    '',
                                    'Rincian Kemunculan:',
                                    ...detailTexts
                                ];
                            }
                        }
                    }
                },
                scales: { 
                    y: { beginAtZero: true, grid: { color: '#e2e8f0' } },
                    x: { grid: { display: false }, ticks: { maxRotation: 0, autoSkip: true, maxTicksLimit: 12 } }
                }
            }
        });
    }

    function initMinimapEngine() {
        if(detections.length === 0) return;

        map = new google.maps.Map(document.getElementById("minimap-container"), {
            zoom: 13,
            mapTypeId: 'satellite', 
            disableDefaultUI: false,
            mapTypeControl: true, zoomControl: true, streetViewControl: false, fullscreenControl: true,
            gestureHandling: 'cooperative' 
        });

        const heatData = detections.map(d => ({ 
            location: new google.maps.LatLng(d.lat, d.lng), 
            weight: d.jumlah 
        }));

        heatmapLayer = new google.maps.visualization.HeatmapLayer({
            data: heatData,
            map: map,
            radius: 20,
            maxIntensity: 50,
            opacity: 0.85,
            gradient: [
                'rgba(0, 255, 0, 0)',    
                'rgba(0, 255, 0, 1)',    
                'rgba(150, 255, 0, 1)',  
                'rgba(255, 255, 0, 1)',  
                'rgba(255, 200, 0, 1)',  
                'rgba(255, 150, 0, 1)',  
                'rgba(255, 100, 0, 1)',  
                'rgba(255, 0, 0, 1)'     
            ]
        });

        const bounds = new google.maps.LatLngBounds();
        heatData.forEach(hd => bounds.extend(hd.location));
        map.fitBounds(bounds);

        map.addListener('zoom_changed', () => {
            const zoom = map.getZoom();
            if (zoom >= 19) heatmapLayer.setOptions({ radius: 40 }); 
            else if (zoom >= 16) heatmapLayer.setOptions({ radius: 20 }); 
            else if (zoom >= 13) heatmapLayer.setOptions({ radius: 10 }); 
            else heatmapLayer.setOptions({ radius: 5 }); 
        });
    }

    window.onload = loadStatistics;
</script>
</body>
</html>
